---
layout: default
---

<article class="photo-page">
  <img src="/assets/images/{{ page.image }}" alt="{{ page.anchor }}">
  <div class="photo-meta">
    <h1>{{ page.title }}</h1>
    <p class="anchor">{{ page.anchor }}</p>
    <span class="tier-badge">Tier {{ page.tier }}</span>
    <span class="category">{{ page.category }}</span>
    <p class="narrative">{{ page.narrative_role }}</p>
  </div>
</article>
